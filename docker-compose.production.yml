# Production / AWS: HTTPS on 443 for Cloudflare Full SSL.
# Usage: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
services:
  nginx:
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/common.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/conf.d/ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
