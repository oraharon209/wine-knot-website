[tool.ruff]
target-version = "py312"
line-length = 100
src = ["scripts"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
]
ignore = []

[tool.ruff.lint.isort]
known-first-party = [
    "wine_bottle_validate",
    "wine_image_names",
    "wine_image_normalize",
]

[tool.ruff.format]
quote-style = "single"
