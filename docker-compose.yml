services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-wineknot}
      MYSQL_USER: ${DB_USER:-wineknot}
      MYSQL_PASSWORD: ${DB_PASSWORD:-wineknot_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/config/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${DOCKER_IMAGE_BACKEND:-wine-knot-backend:latest}
    build: ./backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-wineknot}
      DB_PASSWORD: ${DB_PASSWORD:-wineknot_pass}
      DB_NAME: ${DB_NAME:-wineknot}
      PORT: 3000
      IMAGE_DIR: /app/uploads/images/wines
      IMAGE_STORAGE: ${IMAGE_STORAGE:-local}
      S3_BUCKET: ${S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      ADMIN_AUTH_DISABLED: "true"
      CORS_ORIGINS: http://localhost:8080,https://wineknot.co.il
    volumes:
      - ./frontend/public/images/wines:/app/uploads/images/wines
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/common.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mysql_data:
