name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: Git branch to deploy
        required: false
        default: main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
      DEPLOY_BRANCH: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.branch || 'main') || github.ref_name }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          set -euo pipefail

          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          if [ -z "$INSTANCE_ID" ]; then
            echo "EC2_INSTANCE_ID secret is not set"
            exit 1
          fi

          DEPLOY_SCRIPT=$(cat <<'SCRIPT'
          bash -lc 'set -euo pipefail
          APP_DIR=/opt/wine-knot
          BRANCH=__DEPLOY_BRANCH__
          cd "$APP_DIR"
          sudo -u ubuntu git fetch origin
          sudo -u ubuntu git reset --hard "origin/${BRANCH}"
          bash scripts/deploy.sh'
          SCRIPT
          )
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__DEPLOY_BRANCH__/${DEPLOY_BRANCH}}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "GitHub Actions deploy ${GITHUB_SHA} (${DEPLOY_BRANCH})" \
            --parameters "$(jq -n --arg cmd "$DEPLOY_SCRIPT" '{commands: [$cmd]}')" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command: $COMMAND_ID"

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            case "$STATUS" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardOutputContent" \
                  --output text
                exit 0
                ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID"
                exit 1
                ;;
              *)
                sleep 10
                ;;
            esac
          done

          echo "Deploy timed out waiting for SSM command"
          exit 1
